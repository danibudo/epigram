spring:
  application:
    name: epigram-api

  datasource:
    url: jdbc:postgresql://localhost:5432/epigrams
    username: epigram_user
    password: epigram_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration